services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  db:
    image: postgres:16-alpine
    restart: always
    environment:
      POSTGRES_PASSWORD: bouncr
      POSTGRES_USER: bouncr
    ports:
      - "5432:5432"

  proxy:
    build: ./bouncr-proxy
    depends_on:
      - redis
      - db
    environment:
      GRPC_PORT: "50051"
      REDIS_URL: redis://redis:6379
      DB_DSN: postgres://bouncr:bouncr@db:5432/bouncr?sslmode=disable
      JWT_SECRET: abcdefghijklmnopqrstuvwxyzabcdef
      TOKEN_COOKIE_NAME: BOUNCR_TOKEN
      BACKEND_HEADER_NAME: X-Bouncr-Credential
      INTERNAL_SIGNING_KEY: CHANGE-ME
    ports:
      - "50051:50051"
      - "8081:8081"

  envoy:
    image: envoyproxy/envoy:v1.31-latest
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      - proxy
    volumes:
      - ./envoy/envoy-docker.yaml:/etc/envoy/envoy.yaml:ro
    ports:
      - "3000:3000"
      - "9901:9901"
