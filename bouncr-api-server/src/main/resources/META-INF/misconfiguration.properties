bouncr.GRANT_BOUNCR_USER_ROLE_REQUIRES_EM.problem=In GrantBouncrUserRole hook the EntityManager is null
bouncr.GRANT_BOUNCR_USER_ROLE_REQUIRES_EM.solution=Add EntityManagerMiddleware
bouncr.JWT_SECRET_REQUIRED.problem=JWT signing secret is not configured
bouncr.JWT_SECRET_REQUIRED.solution=Set the JWT_SECRET environment variable to a sufficiently long random string
bouncr.CORS_ORIGINS_REQUIRED.problem=CORS allowed origins are not configured
bouncr.CORS_ORIGINS_REQUIRED.solution=Set the CORS_ORIGINS environment variable or the JVM system property -Dcors.origins to a comma-separated list of allowed origins (e.g. https://app.example.com). In development, CORS_ORIGINS=* is acceptable.
bouncr.CORS_WILDCARD_FORBIDDEN.problem=Wildcard CORS origin (*) is not allowed in production
bouncr.CORS_WILDCARD_FORBIDDEN.solution=Set CORS_ORIGINS to explicit allowed origins (e.g. https://app.example.com). Wildcard is only permitted when enkan.env=development.
bouncr.WEBAUTHN_RP_ID_REQUIRED.problem=WebAuthn Relying Party ID is not configured
bouncr.WEBAUTHN_RP_ID_REQUIRED.solution=Set WEBAUTHN_RP_ID environment variable or configure webAuthnRpId in BouncrConfiguration
bouncr.WEBAUTHN_ORIGIN_REQUIRED.problem=WebAuthn Origin is not configured
bouncr.WEBAUTHN_ORIGIN_REQUIRED.solution=Set WEBAUTHN_ORIGIN environment variable or configure webAuthnOrigin in BouncrConfiguration
