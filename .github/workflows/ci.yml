name: CI

on:
  push:
    branches: [develop, master]
  pull_request:
    branches: [develop, master]

jobs:
  java:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
          cache: maven
      - name: Build and test
        run: mvn verify -B -pl !bouncr-api-e2e-test

  e2e:
    runs-on: ubuntu-latest
    needs: java
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: bouncr
          POSTGRES_PASSWORD: bouncr
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U bouncr"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
          cache: maven
      - name: E2E tests
        run: mvn verify -B -pl bouncr-api-e2e-test -am
        env:
          JDBC_URL: jdbc:postgresql://localhost:5432/bouncr
          JDBC_USER: bouncr
          JDBC_PASSWORD: bouncr
          REDIS_URL: redis://localhost:6379
          JWT_SECRET: ci-test-secret-key-32-characters
          CORS_ORIGINS: '*'
          ENKAN_ENV: development
          INTERNAL_SIGNING_KEY: ci-internal-signing-key-32chars!

  go:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bouncr-proxy
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-go@v6
        with:
          go-version-file: bouncr-proxy/go.mod
          cache-dependency-path: bouncr-proxy/go.sum
      - name: Build
        run: go build ./...
      - name: Test
        run: go test ./...

  ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: bouncr-ui
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 22
      - uses: actions/cache@v4
        with:
          path: ~/.npm
          key: npm-${{ hashFiles('bouncr-ui/package-lock.json') }}
          restore-keys: npm-
      - run: npm ci
      - run: npm run lint
      - run: npm run build

  docker:
    runs-on: ubuntu-latest
    needs: [java, go, ui]
    if: github.ref == 'refs/heads/develop' || github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
          cache: maven
      - name: Build api-server image
        run: mvn install -pl bouncr-api-server -am -B -DskipTests && mvn jib:dockerBuild -pl bouncr-api-server -B
      - name: Build proxy image
        run: docker build -t bouncr/bouncr-proxy bouncr-proxy
      - name: Build ui image
        run: docker build -t bouncr/bouncr-ui bouncr-ui
